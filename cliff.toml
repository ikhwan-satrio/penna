[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
        {{ commit.message | upper_first | trim }}\
        {% if commit.links %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}){% endif %}\
{% endfor %}\n
"""
trim = true
footer = ""

[[commit_parsers]]
    message = "^feat"
    group = "Features"

[[commit_parsers]]
    message = "^fix"
    group = "Bug Fixes"

[[commit_parsers]]
    message = "^doc"
    group = "Documentation"

[[commit_parsers]]
    message = "^perf"
    group = "Performance"

[[commit_parsers]]
    message = "^refactor"
    group = "Refactor"

[[commit_parsers]]
    message = "^style"
    group = "Styling"

[[commit_parsers]]
    message = "^test"
    group = "Tests"

[[commit_parsers]]
    message = "^build"
    group = "Build"

[[commit_parsers]]
    message = "^ci"
    group = "CI"

[[commit_parsers]]
    message = "^chore\\(release\\)"
    skip = true

[[commit_parsers]]
    message = "^chore\\(deps.*\\)"
    skip = true

[[commit_parsers]]
    message = "^chore\\(pr\\)"
    skip = true

[[commit_parsers]]
    message = "^chore\\(pull\\)"
    skip = true

[[commit_parsers]]
    message = "^chore\\(npm\\).*release"
    skip = true

[[commit_parsers]]
    message = "^chore"
    group = "Miscellaneous"

[[commit_parsers]]
    body = ".*security"
    group = "Security"

protect_breaking_changes = false
commit_url = "https://github.com/ikhwan-satrio/penna/commit/{commit}"

[remote.github]
owner = "ikhwan-satrio"
repo = "penna"
