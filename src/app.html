<!doctype html>
<html lang="en" style="background: #080812; color-scheme: dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0a0a0a" />
		<script>
			(function () {
				try {
					var saved = localStorage.getItem('penna-settings');
					var settings = saved ? JSON.parse(saved) : null;
					var themeMode = settings?.themeMode || 'dark';
					var colorTheme = settings?.colorTheme || 'default';

					if (themeMode === 'system') {
						var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
						document.documentElement.classList.add(prefersDark ? 'dark' : 'light');
					} else {
						document.documentElement.classList.add(themeMode);
					}

					var fontSize = settings?.fontSize || 'base';
					var fontSizeMap = { sm: '13px', base: '14px', lg: '16px', xl: '18px' };
					document.documentElement.style.setProperty(
						'--editor-font-size',
						fontSizeMap[fontSize] || '14px'
					);

					var effectiveTheme =
						themeMode === 'system'
							? window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light'
							: themeMode;

					if (effectiveTheme === 'light') {
						document.documentElement.style.colorScheme = 'light';
						document.documentElement.style.background = '';
					}

					var themes = {
						default: {
							dark: {
								'--background': 'oklch(0.10 0 0)',
								'--foreground': 'oklch(0.985 0 0)',
								'--card': 'oklch(0.14 0 0)',
								'--card-foreground': 'oklch(0.985 0 0)',
								'--popover': 'oklch(0.14 0 0)',
								'--popover-foreground': 'oklch(0.985 0 0)',
								'--primary': 'oklch(0.922 0 0)',
								'--primary-foreground': 'oklch(0.14 0 0)',
								'--secondary': 'oklch(0.20 0 0)',
								'--secondary-foreground': 'oklch(0.985 0 0)',
								'--muted': 'oklch(0.20 0 0)',
								'--muted-foreground': 'oklch(0.65 0 0)',
								'--accent': 'oklch(0.20 0 0)',
								'--accent-foreground': 'oklch(0.985 0 0)',
								'--destructive': 'oklch(0.65 0.191 22.216)',
								'--border': 'oklch(1 0 0 / 8%)',
								'--input': 'oklch(1 0 0 / 10%)',
								'--ring': 'oklch(0.50 0 0)'
							},
							light: {
								'--background': 'oklch(1 0 0)',
								'--foreground': 'oklch(0.145 0 0)',
								'--card': 'oklch(1 0 0)',
								'--card-foreground': 'oklch(0.145 0 0)',
								'--popover': 'oklch(1 0 0)',
								'--popover-foreground': 'oklch(0.145 0 0)',
								'--primary': 'oklch(0.205 0 0)',
								'--primary-foreground': 'oklch(0.985 0 0)',
								'--secondary': 'oklch(0.97 0 0)',
								'--secondary-foreground': 'oklch(0.205 0 0)',
								'--muted': 'oklch(0.97 0 0)',
								'--muted-foreground': 'oklch(0.556 0 0)',
								'--accent': 'oklch(0.97 0 0)',
								'--accent-foreground': 'oklch(0.205 0 0)',
								'--destructive': 'oklch(0.577 0.245 27.325)',
								'--border': 'oklch(0.922 0 0)',
								'--input': 'oklch(0.922 0 0)',
								'--ring': 'oklch(0.708 0 0)'
							}
						},
						tokyonight: {
							dark: {
								'--background': '#0f0f1a',
								'--foreground': '#c0caf5',
								'--card': '#141422',
								'--card-foreground': '#c0caf5',
								'--popover': '#141422',
								'--popover-foreground': '#c0caf5',
								'--primary': '#7aa2f7',
								'--primary-foreground': '#0f0f1a',
								'--secondary': '#1e2038',
								'--secondary-foreground': '#c0caf5',
								'--muted': '#1e2038',
								'--muted-foreground': '#565f89',
								'--accent': '#1e2038',
								'--accent-foreground': '#c0caf5',
								'--destructive': '#f7768e',
								'--border': '#2e3450',
								'--input': '#2e3450',
								'--ring': '#7aa2f7'
							},
							light: {
								'--background': '#f7f8fc',
								'--foreground': '#3760bf',
								'--card': '#ffffff',
								'--card-foreground': '#3760bf',
								'--popover': '#ffffff',
								'--popover-foreground': '#3760bf',
								'--primary': '#3760bf',
								'--primary-foreground': '#f7f8fc',
								'--secondary': '#e9e9ec',
								'--secondary-foreground': '#3760bf',
								'--muted': '#e9e9ec',
								'--muted-foreground': '#848cb5',
								'--accent': '#e9e9ec',
								'--accent-foreground': '#3760bf',
								'--destructive': '#8c4351',
								'--border': '#d5d6db',
								'--input': '#d5d6db',
								'--ring': '#3760bf'
							}
						},
						catppuccin: {
							dark: {
								'--background': '#11111b',
								'--foreground': '#cdd6f4',
								'--card': '#151521',
								'--card-foreground': '#cdd6f4',
								'--popover': '#151521',
								'--popover-foreground': '#cdd6f4',
								'--primary': '#cba6f7',
								'--primary-foreground': '#11111b',
								'--secondary': '#252536',
								'--secondary-foreground': '#cdd6f4',
								'--muted': '#252536',
								'--muted-foreground': '#6c7086',
								'--accent': '#252536',
								'--accent-foreground': '#cdd6f4',
								'--destructive': '#f38ba8',
								'--border': '#363649',
								'--input': '#363649',
								'--ring': '#cba6f7'
							},
							light: {
								'--background': '#eff1f5',
								'--foreground': '#4c4f69',
								'--card': '#e6e9ef',
								'--card-foreground': '#4c4f69',
								'--popover': '#e6e9ef',
								'--popover-foreground': '#4c4f69',
								'--primary': '#8839ef',
								'--primary-foreground': '#eff1f5',
								'--secondary': '#ccd0da',
								'--secondary-foreground': '#4c4f69',
								'--muted': '#ccd0da',
								'--muted-foreground': '#7c7f93',
								'--accent': '#ccd0da',
								'--accent-foreground': '#4c4f69',
								'--destructive': '#d20f39',
								'--border': '#bcc0cc',
								'--input': '#bcc0cc',
								'--ring': '#8839ef'
							}
						},
						rosepine: {
							dark: {
								'--background': '#11101d',
								'--foreground': '#e0def4',
								'--card': '#161523',
								'--card-foreground': '#e0def4',
								'--popover': '#161523',
								'--popover-foreground': '#e0def4',
								'--primary': '#eb6f92',
								'--primary-foreground': '#11101d',
								'--secondary': '#1e1c2e',
								'--secondary-foreground': '#e0def4',
								'--muted': '#1e1c2e',
								'--muted-foreground': '#6e6a86',
								'--accent': '#1e1c2e',
								'--accent-foreground': '#e0def4',
								'--destructive': '#eb6f92',
								'--border': '#2e2c42',
								'--input': '#2e2c42',
								'--ring': '#ebbcba'
							},
							light: {
								'--background': '#faf4ed',
								'--foreground': '#575279',
								'--card': '#fffaf3',
								'--card-foreground': '#575279',
								'--popover': '#fffaf3',
								'--popover-foreground': '#575279',
								'--primary': '#d7827e',
								'--primary-foreground': '#faf4ed',
								'--secondary': '#f2e9e1',
								'--secondary-foreground': '#575279',
								'--muted': '#f2e9e1',
								'--muted-foreground': '#9893a5',
								'--accent': '#f2e9e1',
								'--accent-foreground': '#575279',
								'--destructive': '#d7827e',
								'--border': '#e0def4',
								'--input': '#e0def4',
								'--ring': '#ebbcba'
							}
						}
					};

					var vars = themes[colorTheme]?.[effectiveTheme] || themes.default.dark;
					for (var key in vars) {
						document.documentElement.style.setProperty(key, vars[key]);
					}
					document.documentElement.style.background = vars['--background'];
				} catch (e) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div
			id="splash"
			style="
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				background: #080812;
				color: #e5e5e5;
				transition: opacity 0.3s ease;
			"
		>
			<svg
				width="48"
				height="48"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="1.5"
				stroke-linecap="round"
				stroke-linejoin="round"
				style="opacity: 0.6"
			>
				<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
			</svg>
			<div style="font-family: monospace; font-size: 14px; opacity: 0.4">penna</div>
			<div
				style="
					width: 32px;
					height: 32px;
					border: 2px solid rgba(255, 255, 255, 0.1);
					border-top-color: rgba(255, 255, 255, 0.6);
					border-radius: 50%;
					animation: splash-spin 0.8s linear infinite;
				"
			></div>
		</div>
		<style>
			@keyframes splash-spin {
				to {
					transform: rotate(360deg);
				}
			}
			.dark {
				color-scheme: dark;
			}
			.light {
				color-scheme: light;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				min-height: 100vh;
			}
		</style>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
